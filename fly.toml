# fly.toml app configuration file generated for learn-cicd-typescript-starter-lucid-sunrise-7871 on 2026-06-18T22:08:33+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'learn-cicd-typescript-starter-lucid-sunrise-7871'
primary_region = 'arn'

[build]

[deploy]
  release_command = "sh -c 'test -z \"$DATABASE_URL\" || npm run db:migrate'"

[env]
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
